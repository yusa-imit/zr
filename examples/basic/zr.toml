# Basic zr.toml Example
# This demonstrates the core features of zr for a simple project

[project]
name = "my-project"
version = "1.0.0"

# Static project variables — referenced with {{KEY}} in task cmd/cwd/env
[vars]
dist_dir = "dist"
app_name = "my-project"

# Simple tasks
[tasks.hello]
cmd = "echo 'Hello from zr!'"
description = "Print a greeting"

[tasks.build]
cmd = "echo 'Building {{app_name}} to {{dist_dir}}/'"
description = "Build the project"

[tasks.test]
cmd = "echo 'Running tests...'"
description = "Run tests"
# Depend on build task
deps = ["build"]

[tasks.clean]
cmd = "rm -rf {{dist_dir}}/ build/"
description = "Clean build artifacts"

# Task with environment variables
[tasks.deploy]
cmd = "echo 'Deploying to $ENV...'"
description = "Deploy to environment"
deps = ["test"]
env = { ENV = "production" }
# Desktop notification when deployment completes
notify = true
notify_on = "always"
notify_title = "Deployment"

# Task with working directory
[tasks.backend-test]
cmd = "npm test"
description = "Run backend tests"
cwd = "./backend"

# Parallel tasks using matrix
[tasks.lint]
cmd = "echo 'Linting ${{lang}}...'"
description = "Lint all languages"
matrix.lang = ["javascript", "python", "rust"]

# Task that never caches (always runs)
[tasks.timestamp]
cmd = "date"
description = "Show current timestamp"
cache = false

# Task with required environment variables (fails fast if missing)
[tasks.release]
cmd = "echo 'Releasing to $REGISTRY...'"
description = "Push release to registry"
required_env = ["REGISTRY", "API_TOKEN"]
deps = ["build", "test"]

# Task with aliases for convenience
[tasks.fmt]
cmd = "echo 'Formatting code...'"
description = "Format source code"
aliases = ["format", "f"]
