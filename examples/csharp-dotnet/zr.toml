# Auto-generated by `zr init --detect` for .NET project
# Enhanced with custom workflows and profiles

[global]
shell = "bash"

# Basic .NET tasks (auto-detected)

[tasks.build]
description = "Build project with .NET SDK"
cmd = "dotnet build"
inputs = ["**/*.cs", "**/*.csproj"]
outputs = ["bin/", "obj/"]

[tasks.test]
description = "Run tests with .NET"
cmd = "dotnet test"
inputs = ["**/*.cs", "**/*.csproj"]

[tasks.clean]
description = "Clean build artifacts"
cmd = "dotnet clean"

[tasks.restore]
description = "Restore NuGet packages"
cmd = "dotnet restore"
inputs = ["**/*.csproj"]
outputs = ["obj/"]

[tasks.run]
description = "Run the .NET application"
cmd = "dotnet run"
deps = ["build"]

[tasks.publish]
description = "Publish release build"
cmd = "dotnet publish -c Release"
deps = ["test"]
outputs = ["bin/Release/"]

# Enhanced tasks

[tasks.watch]
description = "Run with hot reload"
cmd = "dotnet watch run"
cache = false

[tasks.format]
description = "Format code with dotnet format"
cmd = "dotnet format"

[tasks.lint]
description = "Run code analysis"
cmd = "dotnet build /p:EnforceCodeStyleInBuild=true"

[tasks.coverage]
description = "Generate test coverage report"
cmd = "dotnet test --collect:\"XPlat Code Coverage\""
deps = ["test"]
outputs = ["TestResults/"]

[tasks.package]
description = "Create NuGet package"
cmd = "dotnet pack -c Release"
deps = ["test"]
outputs = ["bin/Release/*.nupkg"]

# CI/CD workflow

[workflows.ci]
description = "Full CI pipeline"

[[workflows.ci.stages]]
tasks = ["restore"]

[[workflows.ci.stages]]
tasks = ["format", "lint"]

[[workflows.ci.stages]]
tasks = ["test", "coverage"]

[[workflows.ci.stages]]
tasks = ["publish"]

# Profiles for different environments

[profile.production]
[profile.production.env]
DOTNET_ENVIRONMENT = "Production"
ASPNETCORE_ENVIRONMENT = "Production"

[profile.development]
[profile.development.env]
DOTNET_ENVIRONMENT = "Development"
ASPNETCORE_ENVIRONMENT = "Development"
