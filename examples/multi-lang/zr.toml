# Multi-Language Project Example
# This demonstrates using zr with multiple programming languages

[project]
name = "polyglot-app"
version = "1.0.0"

# Frontend (TypeScript/Node.js)
[tasks.frontend-install]
cmd = "npm install"
description = "Install frontend dependencies"
cwd = "./frontend"
outputs = ["frontend/node_modules/"]

[tasks.frontend-build]
cmd = "npm run build"
description = "Build frontend"
cwd = "./frontend"
deps = ["frontend-install"]
inputs = ["frontend/src/**/*.ts", "frontend/package.json"]
outputs = ["frontend/dist/"]

[tasks.frontend-test]
cmd = "npm test"
description = "Test frontend"
cwd = "./frontend"
deps = ["frontend-install"]

# Backend (Python)
[tasks.backend-venv]
cmd = "python3 -m venv venv && source venv/bin/activate && pip install -r requirements.txt"
description = "Set up Python virtual environment"
cwd = "./backend"
outputs = ["backend/venv/"]

[tasks.backend-test]
cmd = "source venv/bin/activate && pytest"
description = "Run Python tests"
cwd = "./backend"
deps = ["backend-venv"]
inputs = ["backend/**/*.py", "backend/requirements.txt"]

[tasks.backend-lint]
cmd = "source venv/bin/activate && pylint src/"
description = "Lint Python code"
cwd = "./backend"
deps = ["backend-venv"]

# Database migrations (SQL)
[tasks.db-migrate]
cmd = "psql -f migrations/latest.sql"
description = "Run database migrations"
cwd = "./backend"
env = { DATABASE_URL = "postgresql://localhost/mydb" }

# Infrastructure (Go)
[tasks.infra-build]
cmd = "go build -o bin/deploy ./cmd/deploy"
description = "Build deployment tool"
cwd = "./infra"
outputs = ["infra/bin/"]
inputs = ["infra/**/*.go", "infra/go.mod"]

[tasks.infra-test]
cmd = "go test ./..."
description = "Test infrastructure code"
cwd = "./infra"

# Rust CLI tool
[tasks.cli-build]
cmd = "cargo build --release"
description = "Build CLI tool"
cwd = "./cli-tool"
outputs = ["cli-tool/target/release/"]
inputs = ["cli-tool/src/**/*.rs", "cli-tool/Cargo.toml"]

[tasks.cli-test]
cmd = "cargo test"
description = "Test CLI tool"
cwd = "./cli-tool"

# Aggregate tasks
[tasks.build]
description = "Build all components"
deps = ["frontend-build", "infra-build", "cli-build"]

[tasks.test]
description = "Test all components"
deps = ["frontend-test", "backend-test", "infra-test", "cli-test"]

[tasks.lint]
description = "Lint all components"
deps = ["backend-lint"]

# Docker build
[tasks.docker-build]
cmd = "docker build -t polyglot-app:latest ."
description = "Build Docker image"
deps = ["build"]

# Full CI pipeline
[tasks.ci]
description = "Full CI pipeline"
deps = ["lint", "test", "build"]
