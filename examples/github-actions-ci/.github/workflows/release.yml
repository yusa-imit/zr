name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0

jobs:
  # ============================================================================
  # Full Release Pipeline
  # ============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for changelog generation

      - name: Install zr
        run: |
          curl -fsSL https://raw.githubusercontent.com/yusa-imit/zr/main/install.sh | sh
          echo "$HOME/.zr/bin" >> $GITHUB_PATH

      - name: Run release workflow
        run: zr workflow release
        env:
          GITHUB_REF_TYPE: tag
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Multi-platform Release Builds
  # ============================================================================
  build-release:
    name: Build Release (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            task: build-linux
          - platform: macos-x64
            runner: macos-latest
            task: build-macos
          - platform: windows-x64
            runner: windows-latest
            task: build-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zr (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://raw.githubusercontent.com/yusa-imit/zr/main/install.sh | sh
          echo "$HOME/.zr/bin" >> $GITHUB_PATH

      - name: Install zr (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          irm https://raw.githubusercontent.com/yusa-imit/zr/main/install.ps1 | iex
          echo "$env:USERPROFILE\.zr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release binary
        run: zr run ${{ matrix.task }}

      - name: Package artifacts
        run: zr run package

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: artifacts/*.tar.gz
          retention-days: 90
