name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Cancel in-progress runs when a new workflow with the same group is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Quality Checks (Fast feedback)
  # ============================================================================
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zr
        run: |
          curl -fsSL https://raw.githubusercontent.com/yusa-imit/zr/main/install.sh | sh
          echo "$HOME/.zr/bin" >> $GITHUB_PATH

      - name: Verify zr installation
        run: |
          zr --version
          zr list

      - name: Run quality checks
        run: zr run quality

      - name: Security scan
        run: zr run security-scan

  # ============================================================================
  # Test Matrix (Parallel execution across OS/versions)
  # ============================================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zr (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://raw.githubusercontent.com/yusa-imit/zr/main/install.sh | sh
          echo "$HOME/.zr/bin" >> $GITHUB_PATH

      - name: Install zr (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          irm https://raw.githubusercontent.com/yusa-imit/zr/main/install.ps1 | iex
          echo "$env:USERPROFILE\.zr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run tests
        run: zr run test

  # ============================================================================
  # Build Matrix (Cross-platform binaries)
  # ============================================================================
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [quality, test]
    strategy:
      matrix:
        include:
          - platform: linux
            runner: ubuntu-latest
            task: build-linux
          - platform: macos
            runner: macos-latest
            task: build-macos
          - platform: windows
            runner: windows-latest
            task: build-windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zr (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://raw.githubusercontent.com/yusa-imit/zr/main/install.sh | sh
          echo "$HOME/.zr/bin" >> $GITHUB_PATH

      - name: Install zr (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          irm https://raw.githubusercontent.com/yusa-imit/zr/main/install.ps1 | iex
          echo "$env:USERPROFILE\.zr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build for ${{ matrix.platform }}
        run: zr run ${{ matrix.task }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}/
          retention-days: 7

  # ============================================================================
  # Deploy to Staging (on develop branch)
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zr
        run: |
          curl -fsSL https://raw.githubusercontent.com/yusa-imit/zr/main/install.sh | sh
          echo "$HOME/.zr/bin" >> $GITHUB_PATH

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: dist/

      - name: Deploy to staging
        run: zr run deploy-staging
        env:
          GITHUB_REF_NAME: develop

  # ============================================================================
  # Deploy to Production (on main branch)
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zr
        run: |
          curl -fsSL https://raw.githubusercontent.com/yusa-imit/zr/main/install.sh | sh
          echo "$HOME/.zr/bin" >> $GITHUB_PATH

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: dist/

      - name: Deploy to production
        run: zr run deploy-production
        env:
          GITHUB_REF_NAME: main
