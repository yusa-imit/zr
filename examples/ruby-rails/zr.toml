# Auto-generated by `zr init --detect` for Rails project
# Enhanced with custom workflows and profiles

[global]
shell = "bash"

# Basic Ruby/Rails tasks (auto-detected)

[tasks.install]
description = "Install Ruby gem dependencies"
cmd = "bundle install"
inputs = ["Gemfile", "Gemfile.lock"]
outputs = ["vendor/bundle/"]

[tasks.update]
description = "Update Ruby gems"
cmd = "bundle update"

[tasks.server]
description = "Start Rails development server"
cmd = "bundle exec rails server"
cache = false

[tasks.console]
description = "Start Rails console"
cmd = "bundle exec rails console"
cache = false

[tasks.db-migrate]
description = "Run database migrations"
cmd = "bundle exec rails db:migrate"

[tasks.db-seed]
description = "Seed database with initial data"
cmd = "bundle exec rails db:seed"
deps = ["db-migrate"]

[tasks.db-reset]
description = "Reset database (drop, create, migrate, seed)"
cmd = "bundle exec rails db:reset"

[tasks.test]
description = "Run tests with RSpec"
cmd = "bundle exec rspec"
deps = ["install"]

# Enhanced tasks

[tasks.lint]
description = "Run RuboCop linter"
cmd = "bundle exec rubocop"

[tasks.lint-fix]
description = "Auto-fix RuboCop violations"
cmd = "bundle exec rubocop -A"

[tasks.security-check]
description = "Run Brakeman security scanner"
cmd = "bundle exec brakeman"

[tasks.precompile-assets]
description = "Precompile assets for production"
cmd = "bundle exec rails assets:precompile"
outputs = ["public/assets/"]

[tasks.routes]
description = "Display application routes"
cmd = "bundle exec rails routes"
cache = false

[tasks.coverage]
description = "Generate test coverage report"
cmd = "COVERAGE=true bundle exec rspec"
deps = ["test"]
outputs = ["coverage/"]

# CI/CD workflow

[workflows.ci]
description = "Full CI pipeline"

[[workflows.ci.stages]]
tasks = ["install"]

[[workflows.ci.stages]]
tasks = ["lint", "security-check"]

[[workflows.ci.stages]]
tasks = ["db-migrate", "test"]

[[workflows.ci.stages]]
tasks = ["coverage"]

[workflows.deploy-prep]
description = "Prepare for deployment"

[[workflows.deploy-prep.stages]]
tasks = ["db-migrate"]

[[workflows.deploy-prep.stages]]
tasks = ["precompile-assets"]

# Profiles for different environments

[profile.production]
[profile.production.env]
RAILS_ENV = "production"
RACK_ENV = "production"

[profile.development]
[profile.development.env]
RAILS_ENV = "development"
RACK_ENV = "development"

[profile.test]
[profile.test.env]
RAILS_ENV = "test"
RACK_ENV = "test"
